<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIOHAZARD RENI - Typing Survival Horror</title>
  <meta name="description" content="タイピングサバイバルホラーゲーム。迫りくるB.O.W.をタイピングで撃退せよ。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☣</text></svg>" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud-overlay">
      <div id="hud-top-left" class="hud-element">
        <div id="status-label">STATUS</div>
        <div id="status-value">FINE</div>
      </div>
      <div id="hud-top-right" class="hud-element">
        <div id="score-label">BALANCE</div>
        <div id="score-value">$0</div>
      </div>
      <div id="hud-bottom-left" class="hud-element">
        <div id="heart-monitor-label">VITAL SIGNS</div>
        <canvas id="heart-canvas" width="240" height="60"></canvas>
        <div id="combo-display">
          <span id="combo-label">COMBO</span>
          <span id="combo-value">0</span>
        </div>
      </div>
      <div id="hud-bottom-right" class="hud-element">
        <div id="weapon-name"></div>
        <div id="agent-display"></div>
      </div>
      <div id="hud-center">
        <div id="word-japanese"></div>
        <div id="word-romaji"></div>
        <div id="input-feedback"></div>
      </div>
    </div>
    <div id="screen-flash"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
